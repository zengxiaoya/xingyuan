version: '3.9'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      - PORT=3001
      - NODE_ENV=production
    expose:
      - "3001"
    volumes:
      - sqlite_data:/app/data
    networks:
      - app-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - app-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/starvene.club_bundle.crt:/etc/nginx/starvene.club_bundle.crt:ro
      - ./nginx/starvene.club.key:/etc/nginx/starvene.club.key:ro
    depends_on:
      - server
      - client
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  sqlite_data:
